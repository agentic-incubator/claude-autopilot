# pipeline.yml — the autopilot feature pipeline manifest.
# Lives at .autopilot/pipeline.yml in the TARGET repo (the one you're shipping a feature into).
#
# The top block is the handful of details YOU supply. Everything under `phases:` is
# generated by `autopilot:plan` from your goal + spec, then is yours to edit. A phase plan
# is just data — tweak it, reorder it, split a phase, tighten a Definition of Done.
#
# Lifecycle: plan → queued → (run active pipeline) → promote → run → retire.
#   • There is always ONE active plan (this file). If you scope a NEW feature while one is in
#     flight, `autopilot:plan` parks it at .autopilot/queued/<feature_id>.pipeline.yml (git-ignored)
#     instead of overwriting this file — the running pipeline is never disturbed.
#   • PROMOTE a queued plan (mv it here + seed its ledger) when the active one finishes.
#   • RETIRE is just overwriting this file with the next plan — there is no archive/ dir, and nothing
#     is lost: the old plan stays in git history and as record 0 of its own .autopilot/runs/<id>.jsonl.
#   Exact, copy-pasteable command sequences: plugins/autopilot/docs/lifecycle.md.

# ─────────────────────────────────────────────────────────────────────────────
# YOU SUPPLY THIS
# ─────────────────────────────────────────────────────────────────────────────
# Stable, unique slug for THIS feature/run (kebab-case). It is the run IDENTITY: it scopes every git
# marker, the session ledger at .autopilot/runs/<feature_id>.jsonl, and the plan snapshot embedded as
# that ledger's first line — so multiple features (and re-attempts) in one repo never collide; the
# state grep only ever sees this slug's markers. `autopilot:plan` derives it from the goal; keep it fixed
# once a phase has landed. A fresh attempt at the same feature gets a NEW slug (e.g. -v2) — that is how
# autopilot models "run again": a new lineage, not a second run of one plan. Markers read as
# `(autopilot:<feature_id>): …`.
feature_id: "my-feature"
goal: "One sentence: the feature this pipeline ships."
spec: "docs/specs/my-feature.md"   # path | URL | inline prose. Source of truth for the plan.

# The design corpus autopilot reads to UNDERSTAND the work before/while building.
# `autopilot:detect` auto-discovers these; leave empty/remove what doesn't exist. Each phase reads
# only the SLICE of these that names its concern (the memory contract), not the whole corpus.
references:
  prd:     ""                       # product requirements doc(s) — the "why" and acceptance intent
  plan:    ""                       # an existing implementation/roadmap doc, if separate from this file
  adr_dir: "docs/architecture/adr"  # Architecture Decision Records — constraints the impl must honor
  ddd_dir: "docs/architecture/ddd"  # domain model / bounded contexts / aggregates / ubiquitous language
  extra:   []                       # any other authoritative docs (RFCs, threat models, API specs)

# Branch model. trunk is NEVER merged autonomously — a human always merges the final PR.
trunk: main
base:  develop                     # long-running integration branch the loop merges phases into

# Autonomy mode:
#   reviewed  — implement one phase locally, commit a `gate PASSED` marker, STOP for you to inspect.
#   pr_ci     — fire-and-forget: branch -> PR -> CI -> bounded fix-loop -> squash-merge into base.
autonomy: reviewed

fix_budget: 5                      # CI-fix iterations per PR before handing off (pr_ci mode)

# Parallel execution of independent ready units (pr_ci mode only — see
# plugins/autopilot/docs/adr/0002-parallel-ready-units-merge-queue.md). Default 1 = serial, identical
# to a single-phase-per-firing pipeline. Set >1 to let orchestrate implement several dependency-ready
# units at once (each in its own git worktree + phase branch), merging them ONE AT A TIME through a
# rebase-and-re-gate queue so a stale-base conflict can never merge. `reviewed` mode ignores this and
# always runs serially.
max_parallel: 1                    # 1 = serial (default). >1 = up to N concurrent ready units.
requeue_budget: 2                  # in-queue rebase/re-gate retries before a conflicted unit is
                                   # dropped back to not-started and re-implemented against the new base.

# Phases where the expensive adversarial passes (mutation / pentest / chaos) are worth it.
# Empty = run the lightweight gate everywhere, heavy passes nowhere.
risk_phases: []

# ─────────────────────────────────────────────────────────────────────────────
# GENERATED by `autopilot:plan` — edit freely
# ─────────────────────────────────────────────────────────────────────────────
phases:
  - id: 0
    goal: "What this phase makes true that wasn't before."
    # Optional track/bounded-context this phase belongs to. Purely a label for multi-track features
    # (a system of several bounded contexts): it groups phases for readability and, when beads is
    # present, becomes the epic a unit hangs under. Omit it and nothing changes — single-track plans
    # need no tracks. See plugins/autopilot/docs/adr/0001-dependency-aware-work-graph-beads-ruflo.md.
    track: ""                        # e.g. "billing" | "identity" | "" (untracked)
    deliverables:
      - "Concrete artifact 1 (a module, an endpoint, a migration...)."
      - "Concrete artifact 2."
    # Definition of Done MUST be machine-checkable — each line is a check the gate can run.
    # Prefer `cmd:` (a command that must succeed) and `grep:` (a pattern that must / must not
    # appear) over prose, so the gate can verify rather than guess.
    definition_of_done:
      - "cmd: <the test command> passes covering deliverable 1"
      - "grep:absent: TODO|FIXME in the new module"
      - "prose: behaviour X is documented in the spec and realized in code at <path>"
    # Optional per-phase hints fed into the runner's 'match the house style' step.
    conventions: ""
    # Phase ids that must be gate-PASSED before this one may start. This is the WORK GRAPH:
    # orchestrate runs the dependency-aware ready-set (a phase is ready when it isn't PASSED and every
    # depends_on id IS PASSED), picking the lowest-id ready phase. Leave it empty and phases run in id
    # order — identical to a flat linear pipeline. Declare deps across tracks to unblock true DAG
    # ordering (a later-id phase can run before an earlier one that's still blocked).
    depends_on: []
    # Files/areas this phase is expected to modify (globs). ONLY used when max_parallel > 1: two
    # dependency-ready units are dispatched concurrently only if their `touches` sets are DISJOINT —
    # overlap (or an empty/unknown set) means run them serially instead. Advisory, not enforced: the
    # merge-queue re-gate is the real safety net, so a missed overlap just costs a re-queue, never a bad
    # merge. Ignored entirely when max_parallel is 1. See ADR-0002.
    touches: []                     # e.g. ["src/billing/**", "migrations/**"]
    # The SLICE of the design corpus this phase must read & honor (names/globs/ids, not whole dirs).
    # This is how comprehension stays cheap: a phase reads only the ADRs/DDD aggregates it touches.
    adrs:  []                       # e.g. ["ADR-007-merge-strategy", "ADR-010-authz"]
    ddd:   []                       # e.g. ["RemediationRun aggregate", "PolicyResolver"]
