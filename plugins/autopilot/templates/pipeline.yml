# pipeline.yml — the autopilot feature pipeline manifest.
# Lives at .autopilot/pipeline.yml in the TARGET repo (the one you're shipping a feature into).
#
# The top block is the handful of details YOU supply. Everything under `phases:` is
# generated by `autopilot:plan` from your goal + spec, then is yours to edit. A phase plan
# is just data — tweak it, reorder it, split a phase, tighten a Definition of Done.

# ─────────────────────────────────────────────────────────────────────────────
# YOU SUPPLY THIS
# ─────────────────────────────────────────────────────────────────────────────
# Stable, unique slug for THIS feature/run (kebab-case). Scopes every git marker AND the session
# ledger at .autopilot/runs/<feature_id>.jsonl, so multiple autopilot runs in the same repo never
# collide — the state grep only ever sees this feature's markers. `autopilot:plan` derives it from the
# goal; keep it fixed once the first phase has landed. Markers read as `(autopilot:<feature_id>): …`.
feature_id: "my-feature"
goal: "One sentence: the feature this pipeline ships."
spec: "docs/specs/my-feature.md"   # path | URL | inline prose. Source of truth for the plan.

# The design corpus autopilot reads to UNDERSTAND the work before/while building.
# `autopilot:detect` auto-discovers these; leave empty/remove what doesn't exist. Each phase reads
# only the SLICE of these that names its concern (the memory contract), not the whole corpus.
references:
  prd:     ""                       # product requirements doc(s) — the "why" and acceptance intent
  plan:    ""                       # an existing implementation/roadmap doc, if separate from this file
  adr_dir: "docs/architecture/adr"  # Architecture Decision Records — constraints the impl must honor
  ddd_dir: "docs/architecture/ddd"  # domain model / bounded contexts / aggregates / ubiquitous language
  extra:   []                       # any other authoritative docs (RFCs, threat models, API specs)

# Branch model. trunk is NEVER merged autonomously — a human always merges the final PR.
trunk: main
base:  develop                     # long-running integration branch the loop merges phases into

# Autonomy mode:
#   reviewed  — implement one phase locally, commit a `gate PASSED` marker, STOP for you to inspect.
#   pr_ci     — fire-and-forget: branch -> PR -> CI -> bounded fix-loop -> squash-merge into base.
autonomy: reviewed

fix_budget: 5                      # CI-fix iterations per PR before handing off (pr_ci mode)

# Phases where the expensive adversarial passes (mutation / pentest / chaos) are worth it.
# Empty = run the lightweight gate everywhere, heavy passes nowhere.
risk_phases: []

# ─────────────────────────────────────────────────────────────────────────────
# GENERATED by `autopilot:plan` — edit freely
# ─────────────────────────────────────────────────────────────────────────────
phases:
  - id: 0
    goal: "What this phase makes true that wasn't before."
    deliverables:
      - "Concrete artifact 1 (a module, an endpoint, a migration...)."
      - "Concrete artifact 2."
    # Definition of Done MUST be machine-checkable — each line is a check the gate can run.
    # Prefer `cmd:` (a command that must succeed) and `grep:` (a pattern that must / must not
    # appear) over prose, so the gate can verify rather than guess.
    definition_of_done:
      - "cmd: <the test command> passes covering deliverable 1"
      - "grep:absent: TODO|FIXME in the new module"
      - "prose: behaviour X is documented in the spec and realized in code at <path>"
    # Optional per-phase hints fed into the runner's 'match the house style' step.
    conventions: ""
    depends_on: []                 # phase ids that must be gate-PASSED before this one starts
    # The SLICE of the design corpus this phase must read & honor (names/globs/ids, not whole dirs).
    # This is how comprehension stays cheap: a phase reads only the ADRs/DDD aggregates it touches.
    adrs:  []                       # e.g. ["ADR-007-merge-strategy", "ADR-010-authz"]
    ddd:   []                       # e.g. ["RemediationRun aggregate", "PolicyResolver"]
